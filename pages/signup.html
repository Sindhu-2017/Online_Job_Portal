<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="../styles/signup.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

    <!-- navigation container -->
    <div class="container-fluid" id="navContainer">
        <nav class="navbar navbar-expand-lg p-3">
            <a class="navbar-brand text-white fw-bold fs-4" href="../index.html">HireHub</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navOptions">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navOptions">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><button class="btn me-2" id="themeBtn">Theme</button></li>
                </ul>
            </div>
        </nav>
    </div>


    <!-- signup container -->
    <div class="container mt-5 p-5 d-flex justify-content-center align-items-center">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Signup</h2>
            </div>
            <div class="card-body">
                <form id="signupForm">
                    <!-- Fullname -->
                    <label for="fullname" class="form-label">Fullname</label>
                    <div class="input-group mb-2">
                        <span class="input-group-text">
                            <i class="bi bi-person-circle"></i>
                        </span>
                        <input type="text" id="fullname" class="form-control" placeholder="Enter your name">
                        <div class="invalid-feedback">
                            Name can contain alphabets and space.
                        </div>
                    </div>

                    <!-- email -->
                    <label for="email" class="form-label">Email</label>
                    <div class="input-group mb-2">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" id="email" class="form-control" placeholder="Enter your email">
                        <div class="invalid-feedback">
                            Invalid email
                        </div>
                    </div>

                    <!-- phone -->
                    <label for="phone" class="form-label">Phone</label>
                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-phone"></i>
                        </span>
                        <input type="number" id="phone" class="form-control" placeholder="Enter your mobileno">
                        <div class="invalid-feedback">
                            Invalid mobile number
                        </div>
                    </div>

                    <!-- dob -->
                    <label for="dob" class="form-label">Date of Birth</label>
                    <div class="input-group mb-2">
                        <span class="input-group-text">
                            <i class="bi bi-calendar-date"></i>
                        </span>
                        <input type="date" id="dob" class="form-control" placeholder="Enter you DOB">
                    </div>

                    <!-- gender -->
                    <label for="gender" class="form-label">Gender</label>
                    <div class="border rounded-1 p-2 mb-2">
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input" name="gender" id="male" value="male">
                            <label class="form-check-label">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input" name="gender"  id="female" value="female">
                            <label class="form-check-label">Female</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input" name="gender" id="others" value="others">
                            <label class="form-check-label">Others</label>
                        </div>                        
                    </div>

                    <div class="text-danger d-none mt-1" id="genderError">
                        Select gender
                    </div>
                    

                    <!-- role(Recruiters/Applicant) -->
                    <label for="role" class="form-label">Role</label>
            
                    <select id="role" class="form-select mb-3">
                        <option value="">Select Role</option>
                        <option value="Recruiter">Recruiter</option>
                        <option value="Applicant">Applicant</option>
                    </select>
                    

                    <!-- company name(Recruiters) -->
                    <div id="companyName" class="d-none">
                        <label for="compName" class="form-label">Company Name</label>
                        <div class="input-group mb-2">
                            <span class="input-group-text">
                                <i class="bi bi-building"></i>
                            </span>
                            <input type="text" id="compName" class="form-control" placeholder="Company Name">
                            <div class="invalid-feedback">
                                Select your role
                            </div>
                        </div>
                    </div>

                    <!-- company location(Recruiters) -->
                    <div class="d-none" id="companyLocation">
                        <label for="compLocation" class="form-label">Company Location</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text">
                                <i class="bi bi-geo-alt"></i>
                            </span>
                            <input type="text" id="compLocation" class="form-control" placeholder="Company Location">
                        </div>
                    </div>

                    <!-- qualification(Applicant) -->
                    <label for="qualification" class="form-label">Qualification</label>
                    <div class="input-group mb-3">
                        <span class="input-group-text">
                             <i class="bi bi-mortarboard"></i>
                        </span>
                        <input type="text" id="qualification" class="form-control" placeholder="Qualification ex:BSc Computer Technology">
                    </div>

                    <!-- experience(Applicant) -->
                    <label for="experience" class="form-label">Experience</label>
                    <div class="input-group mb-3">
                        <span class="input-group-text">
                             <i class="bi bi-briefcase"></i>
                        </span>
                        <input type="number" id="experience" class="form-control" placeholder="Experience(Years)">
                    </div>

                    <!-- skills(applicant) -->
                    <div id="skillContainer">
                        <label for="skills" class="form-label">Skills</label>
                        <div class="border rounded-1 p-2 mb-3">
                            <div class="row g-2">
                                <div class=" col-12 col-md-3">
                                    <div class="form-check">
                                        <input type="checkbox" id="html" value="html" class="form-check-input">
                                        <label class="form-check-label">HTML</label>
                                    </div>
                                </div>
                                
                                <div class=" col-12 col-md-3">
                                    <div class="form-check">
                                        <input type="checkbox" id="css" value="css" class="form-check-input">
                                        <label class="form-check-label">CSS</label>
                                    </div>
                                </div>
                                
                                <div class=" col-12 col-md-3">
                                    <div class-="form-check">
                                        <input type="checkbox" id="js" value="js" class="form-check-input">
                                        <label class="form-check-label">JAVASCRIPT</label>
                                    </div>
                                </div>

                                <div class=" col-12 col-md-3">
                                    <div class-="form-check">
                                        <input type="checkbox" id="angular" value="angular" class="form-check-input">
                                        <label class="form-check-label">ANGULAR</label>
                                    </div>
                                </div>

                                <div class=" col-12 col-md-3">
                                    <div class-="form-check">
                                        <input type="checkbox" id="react" value="react" class="form-check-input">
                                        <label class="form-check-label">REACT</label>
                                    </div>
                                </div>

                                <div class=" col-12 col-md-3">
                                    <div class-="form-check">
                                        <input type="checkbox" id="c#" value="c#" class="form-check-input">
                                        <label class="form-check-label">C#</label>
                                    </div>
                                </div>
                            </div>
                        </div> 
                    </div>   
                    <div class="passwords row g-3 mb-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label ms-1" for="password">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password" id="password" placeholder="Enter password" class="form-control">
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label ms-1" for="confirm">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-shield-lock"></i>
                                </span>
                                <input type="password" id="confirm" placeholder="Confirm Password" class="form-control">
                            </div>
                            
                        </div>                        
                        
                    </div>
                    
                    <button type="submit" id="signBtn" class="btn mt-3 w-100" >Signup</button>
                    
                    <p class="text-center mt-2">Already Registered?<a href="../index.html" class="text-decoration-none fw-bold ms-2">Go Back and Login</a></p>

                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="../scripts/signup.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
